name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        env:
          NODE_ENV: production
          BASE_PATH: /
          VITE_FIREBASE_AUTH_DOMAIN: noooooor-app.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: noooooor-app
          VITE_FIREBASE_STORAGE_BUCKET: noooooor-app.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "230599694330"
          VITE_FIREBASE_APP_ID: "1:230599694330:web:8780636368d1469591f643"
          VITE_FIREBASE_MEASUREMENT_ID: G-P96TYMPZQF
          VITE_FIREBASE_API_KEY: AIzaSyDOVE54x_j5fldKYwTRAG9QzdRok_pD074
        run: pnpm --filter @workspace/noor build

      - name: Copy web bundle to capacitor webDir
        run: |
          mkdir -p dist/public
          cp -R artifacts/noor/dist/public/. dist/public/

      - name: Capacitor sync
        run: pnpm exec cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/noor-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: noor-apk
          path: release/*.apk
          retention-days: 30

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Noor build #${{ github.run_number }}
          body: |
            بناء تلقائي لتطبيق نُور.
            حمّل الملف noor-${{ github.run_number }}.apk من قسم Assets أسفله.
          files: release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
